<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <link href="styles/style.css" rel="stylesheet">
</head>
<body>

<form>
<fieldset>
    <legend>Persoonlijke informatie</legend>
    <label for="voornaam">Voornaam*:</label>
    <input type="text" id="voornaam" name="voornaam" placeholder="Your first name" required autofocus><br>
    <label for="familienaam">Familienaam*:</label>
    <input type="text" id="familienaam" name="familienaam" placeholder="Your last name" required>
</fieldset>

<fieldset>
    <legend>Sport</legend>
    <p>Welke sport beoefen je?</p>
    <input type="checkbox" id="lopen" name="sport" value="lopen">
    <label for="lopen">Lopen</label><br>
    <input type="checkbox" id="zwemmen" name="sport" value="zwemmen">
    <label for="zwemmen">Zwemmen</label><br>
    <input type="checkbox" id="roeien" name="sport" value="roeien">
    <label for="roeien">Roeien</label>
</fieldset>

<fieldset>
    <legend>Communicatievoorkeur</legend>
    <p>Hoe kunnen we je bereiken?</p>
    <input type="radio" id="post" name="communicatie" value="post">
    <label for="post">Per post</label><br>
    <input type="radio" id="email_comm" name="communicatie" value="email">
    <label for="email_comm">E-mail</label>
</fieldset>

<fieldset>
    <legend>Favorieten</legend>
    <label for="film">Favoriete film:</label>
    <input type="text" id="film" name="film"><br>
    <label for="quote">Favoriete quote:</label>
    <textarea id="quote" name="quote" placeholder="Schrijf je favoriete quote"></textarea><br>
    <label for="eten">Favoriete eten:</label>
    <select id="eten" name="eten" size="3">
        <option value="hamburger">Hamburger</option>
        <option value="hotdog">Hot-dog</option>
        <option value="pizza" selected>Pizza</option>
    </select><br>
    <label for="browser">Favoriete browser:</label>
    <input type="text" id="browser" name="browser">
</fieldset>

<fieldset>
    <legend>Beveiliging &amp; contact</legend>
    <label for="wachtwoord">Wachtwoord*:</label>
    <input type="password" id="wachtwoord" name="wachtwoord" required><br>
    <label for="emailadres">E-mailadres:</label>
    <input type="email" id="emailadres" name="emailadres" placeholder="Geef je e-mailadres in"><br>
    <label for="favoriet_site">Favoriete site:</label>
    <input type="url" id="favoriet_site" name="favoriet_site" placeholder="Geef de URL van je favoriete">
</fieldset>

<fieldset>
    <legend>Extra informatie</legend>
    <label for="getal_1_10">Favoriete getal tussen 1-10:</label>
    <input type="number" id="getal_1_10" name="getal_1_10" min="1" max="10"><br>
    <label for="getal_11_1000">Favoriete getal tussen 11-1000:</label>
    <input type="range" id="getal_11_1000" name="getal_11_1000" min="11" max="1000"><br>
    <label for="geboortedatum">Wanneer ben je geboren?</label>
    <input type="date" id="geboortedatum" name="geboortedatum"><br>
    <label for="postcode">Belgische postcode*:</label>
    <input type="text" id="postcode" name="postcode" required pattern="^[1-9][0-9]{3}$" placeholder="9999" maxlength="4" title="Voer een geldige Belgische postcode in (1000–9999)">
</fieldset>

<fieldset>
    <legend>Varia</legend>
    <label for="zoeken">Zoeken naar iets:</label>
    <input type="search" id="zoeken" name="zoeken"><br>
    <label for="kleur">Wat is je lievelingskleur?</label>
    <input type="color" id="kleur" name="kleur" value="#000000"><br>
    <input type="file" id="bestand" name="bestand">
</fieldset>
</form>

<button type="submit">Submit</button>


<script src="scripts/script.js"></script>
</body>
</html>
